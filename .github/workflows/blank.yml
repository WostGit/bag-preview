                      "https://raw.githubusercontent.com/jorritb/dutch-postal-codes/main/postcodes.csv",
                      "https://raw.githubusercontent.com/jorritb/dutch-postal-codes/master/dutch-postal-codes.csv",
                      "https://raw.githubusercontent.com/jorritb/dutch-postal-codes/main/dutch-postal-codes.csv",
                  ],
              )
              test_candidate_urls("github_jorritb_dutch_postal_codes", jorritb_urls)


          def render_summary():
              passes = sum(1 for r in RESULTS if r["verdict"] == "pass")
              warns = sum(1 for r in RESULTS if r["verdict"] == "warn")
              fails = sum(1 for r in RESULTS if r["verdict"] == "fail")
              skips = sum(1 for r in RESULTS if r["verdict"] == "skip")

              lines = []
              lines.append("# NL address options verbose matrix")
              lines.append("")
              lines.append(f"- Generated: `{now_iso()}`")
              lines.append(f"- BAG API key present: `{bool(BAG_API_KEY)}`")
              lines.append(f"- Results: pass={passes}, warn={warns}, fail={fails}, skip={skips}")
              lines.append("")

              lines.append("## Result summary")
              lines.append("")
              lines.append("| Key | Category | Verdict | Status | Notes |")
              lines.append("|---|---|---|---:|---|")
              for r in RESULTS:
                  st = "" if r["status"] is None else str(r["status"])
                  note = r["notes"].replace("|", "\\|")
                  lines.append(f"| `{r['key']}` | {r['category']} | **{r['verdict']}** | {st} | {note} |")

              lines.append("")
              lines.append("## Attempt matrix")
              lines.append("")
              lines.append("| Dataset | Source | URL | Status | Duration ms | Error |")
              lines.append("|---|---|---|---:|---:|---|")
              for a in ATTEMPTS:
                  st = "" if a["status"] is None else str(a["status"])
                  dur = "" if a["duration_ms"] is None else str(a["duration_ms"])
                  err = "" if not a["error"] else str(a["error"]).replace("|", "\\|")
                  src = a.get("source", "")
                  url = a["url"].replace("|", "%7C")
                  lines.append(f"| `{a['dataset_key']}` | `{src}` | `{url}` | {st} | {dur} | {err} |")

              return "\n".join(lines) + "\n"


          def main():
              check_pdok_locatieserver()
              check_pdok_locatieserver_suggest()
              check_pdok_bag_ogc()
              check_kadaster_bag()
              test_all_datasets()

              report = {
                  "generated_at": now_iso(),
                  "bag_api_key_present": bool(BAG_API_KEY),
                  "results": RESULTS,
                  "attempts": ATTEMPTS,
              }

              with open("nl-address-options-report.json", "w", encoding="utf-8") as f:
                  json.dump(report, f, indent=2, ensure_ascii=False)

              with open("nl-address-options-summary.md", "w", encoding="utf-8") as f:
                  f.write(render_summary())

              print(json.dumps(report, indent=2, ensure_ascii=False))

              required_fail_keys = {
                  "pdok_locatieserver_free",
                  "pdok_locatieserver_suggest",
                  "pdok_bag_ogc_collections",
                  "pdok_bag_ogc_items",
              }

              hard_fails = [
                  r for r in RESULTS
                  if r["verdict"] == "fail" and r["key"] in required_fail_keys
              ]

              if hard_fails:
                  print("Required failures detected:", file=sys.stderr)
                  for r in hard_fails:
                      print(f"- {r['key']}: {r['notes']}", file=sys.stderr)
                  return 1

              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
