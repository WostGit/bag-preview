name: Random Dutch house from LJPc dataset

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  random-nl-house:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependency
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install zstandard

      - name: Pick a random Dutch house
        shell: bash
        run: |
          set -euo pipefail

          cat > random_nl_house.py <<'PY'
          import csv
          import io
          import json
          import random
          import urllib.request
          import zstandard as zstd

          URL = "https://raw.githubusercontent.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/main/Nederland.csv.zst"
          USER_AGENT = "random-nl-house-github-action/1.0"

          def random_address_from_zstd_csv(url: str) -> dict:
              req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              with urllib.request.urlopen(req, timeout=120) as resp:
                  dctx = zstd.ZstdDecompressor()
                  with dctx.stream_reader(resp) as reader:
                      text_stream = io.TextIOWrapper(reader, encoding="utf-8", newline="")
                      csv_reader = csv.DictReader(text_stream, delimiter=";")

                      chosen = None
                      count = 0

                      for row in csv_reader:
                          if not row.get("postcode") or not row.get("huisnummer") or not row.get("straat"):
                              continue

                          count += 1
                          if random.randrange(count) == 0:
                              chosen = row

                      if chosen is None:
                          raise RuntimeError("No usable address rows found.")

                      return chosen

          row = random_address_from_zstd_csv(URL)

          address = " ".join(
              x for x in [
                  row.get("straat", "").strip(),
                  row.get("huisnummer", "").strip(),
                  row.get("huisletter", "").strip(),
                  row.get("huisnummertoevoeging", "").strip(),
              ] if x
          ).strip()

          result = {
              "address": address,
              "postcode": row.get("postcode", "").strip(),
              "woonplaats": row.get("woonplaats", "").strip(),
              "gemeente": row.get("gemeente", "").strip(),
              "provincie": row.get("provincie", "").strip(),
              "lat": row.get("lat", "").strip(),
              "lon": row.get("lon", "").strip(),
              "source_url": URL,
          }

          print(json.dumps(result, indent=2, ensure_ascii=False))

          with open("random-nl-house.json", "w", encoding="utf-8") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          with open("random-nl-house.txt", "w", encoding="utf-8") as f:
              f.write("Random Dutch address\n")
              f.write(f"{result['address']}\n")
              f.write(f"{result['postcode']} {result['woonplaats']}\n")
              f.write(f"Gemeente: {result['gemeente']}\n")
              f.write(f"Provincie: {result['provincie']}\n")
              f.write(f"Lat/Lon: {result['lat']} {result['lon']}\n")
              f.write(f"Source: {result['source_url']}\n")
          PY

          python random_nl_house.py

      - name: Add result to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Random Dutch house"
            echo
            cat random-nl-house.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: random-nl-house-json
          path: random-nl-house.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload text artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: random-nl-house-text
          path: random-nl-house.txt
          if-no-files-found: warn
          retention-days: 14
