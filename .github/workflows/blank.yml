                      "https://github.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/releases/latest/download/adressen.csv.zst",
                      "https://github.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/releases/latest/download/postcodes.csv.zst",
                      "https://github.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/releases/latest/download/nederlandse-adressen.csv.zst",
                      "https://github.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/releases/latest/download/nederlandse-postcodes.csv.zst",
                  ],
              )
