name: BAG address dataset preview

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  bag-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download BAG extract and print previews
        env:
          BAG_ZIP_URL: https://service.pdok.nl/kadaster/bag-adressen/atom/downloads/lvbag-extract-nl.zip
        run: |
          python - <<'PY'
          import os
          import re
          import zipfile
          import xml.etree.ElementTree as ET
          from pathlib import Path
          from urllib.parse import urlparse
          import random
          import requests

          out_dir = Path("bag_data")
          out_dir.mkdir(parents=True, exist_ok=True)

          url = os.environ["BAG_ZIP_URL"]
          zip_name = Path(urlparse(url).path).name or "lvbag-extract-nl.zip"
          zip_path = out_dir / zip_name

          print(f"Downloading: {url}")
          with requests.get(url, stream=True, timeout=300) as r:
              r.raise_for_status()
              with zip_path.open("wb") as f:
                  for chunk in r.iter_content(chunk_size=1024 * 1024):
                      if chunk:
                          f.write(chunk)

          size = zip_path.stat().st_size
          print(f"Saved: {zip_path}")
          print(f"Size: {size} bytes")

          if size < 1024:
              raise SystemExit("Downloaded file is unexpectedly small")

          with zip_path.open("rb") as f:
              head = f.read(512).lower()
              if b"<html" in head:
                  raise SystemExit("Downloaded file looks like HTML, not a ZIP dataset")

          extract_dir = out_dir / "unzipped"
          extract_dir.mkdir(exist_ok=True)

          with zipfile.ZipFile(zip_path, "r") as zf:
              names = zf.namelist()
              if not names:
                  raise SystemExit("ZIP is empty")
              bad = zf.testzip()
              if bad is not None:
                  raise SystemExit(f"ZIP is corrupt at member: {bad}")

              print("\n=== ZIP CONTENT PREVIEW ===")
              for name in names[:40]:
                  print(name)
              if len(names) > 40:
                  print(f"... and {len(names) - 40} more files")

              zf.extractall(extract_dir)

          xml_files = sorted(extract_dir.rglob("*.xml"))
          if not xml_files:
              raise SystemExit("No XML files found after extraction")

          print(f"\nFound {len(xml_files)} XML files")
          print("First few XML files:")
          for p in xml_files[:10]:
              print(" -", p)

          def strip_ns(tag: str) -> str:
              return tag.split("}", 1)[-1] if "}" in tag else tag

          def first_text(elem, wanted_local_names):
              for sub in elem.iter():
                  if strip_ns(sub.tag) in wanted_local_names:
                      text = (sub.text or "").strip()
                      if text:
                          return text
              return None

          def iter_address_like_records(xml_path):
              try:
                  tree = ET.parse(xml_path)
                  root = tree.getroot()
              except Exception:
                  return

              for elem in root.iter():
                  local = strip_ns(elem.tag).lower()
                  if local in {
                      "nummeraanduiding",
                      "adresseerbaarobject",
                      "verblijfsobject",
                      "ligplaats",
                      "standplaats",
                  }:
                      postcode = first_text(elem, {"postcode"})
                      huisnummer = first_text(elem, {"huisnummer"})
                      straat = first_text(elem, {"openbareruimtenaam", "straatnaam", "naam"})
                      woonplaats = first_text(elem, {"woonplaatsnaam"})

                      if postcode and huisnummer:
                          yield {
                              "straat": straat,
                              "huisnummer": huisnummer,
                              "postcode": postcode,
                              "woonplaats": woonplaats,
                              "source": str(xml_path),
                          }

          preview = []
          sample_pool = []

          for xml_file in xml_files:
              for rec in iter_address_like_records(xml_file):
                  if len(preview) < 10:
                      preview.append(rec)
                  if len(sample_pool) < 500:
                      sample_pool.append(rec)
                  if len(preview) >= 10 and len(sample_pool) >= 500:
                      break
              if len(preview) >= 10 and len(sample_pool) >= 500:
                  break

          if not preview:
              raise SystemExit("Could not parse any postcode/huisnummer records from the extract")

          print("\n=== DATA PREVIEW (first parsed addresses) ===")
          for i, rec in enumerate(preview, 1):
              print(
                  f"{i:02d} | "
                  f"{rec.get('straat') or '?'} | "
                  f"{rec['huisnummer']} | "
                  f"{rec['postcode']} | "
                  f"{rec.get('woonplaats') or '?'}"
              )

          print("\n=== RANDOM SAMPLE OF 10 ADDRESSES ===")
          chosen = random.sample(sample_pool, min(10, len(sample_pool)))
          for i, rec in enumerate(chosen, 1):
              print(
                  f"{i:02d} | "
                  f"{rec.get('straat') or '?'} | "
                  f"{rec['huisnummer']} | "
                  f"{rec['postcode']} | "
                  f"{rec.get('woonplaats') or '?'}"
              )
          PY
