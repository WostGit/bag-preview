name: Playwright Bol Register Smart Fast

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATASET_URL: https://raw.githubusercontent.com/LJPc-solutions/Nederlandse-adressen-en-postcodes/main/Nederland.csv.zst
      DATASET_DIR: .cache/nl-addresses
      DATASET_FILE: .cache/nl-addresses/Nederland.csv.zst

      BOL_FIRST_NAME: "Jan"
      BOL_INFIX: "van"
      BOL_LAST_NAME: "Dijk"
      BOL_SALUTATION: "UNKNOWN"
      BOL_COUNTRY_MODE: "NL"
      BOL_PHONE: "0612345678"
      BOL_BIRTHDAY: "01-01-1990"
      BOL_EMAIL: "test@example.com"
      BOL_PASSWORD: "StrongPass123!"
      BOL_PURCHASE_NEWSLETTER: "true"
      BOL_RECOMMENDATION_NEWSLETTER: "false"
      SUBMIT_FORM: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install zstandard

      - name: Restore cached dataset
        id: cache-dataset
        uses: actions/cache@v4
        with:
          path: .cache/nl-addresses
          key: ${{ runner.os }}-nl-addresses-ljpc-nederland-v1
          restore-keys: |
            ${{ runner.os }}-nl-addresses-ljpc-

      - name: Download dataset on cache miss
        if: steps.cache-dataset.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DATASET_DIR"
          curl -L --fail --retry 3 --retry-delay 2 \
            -A "playwright-bol-register/1.0" \
            "$DATASET_URL" \
            -o "$DATASET_FILE"
          ls -lh "$DATASET_FILE"

      - name: Pick random Dutch address
        shell: bash
        run: |
          set -euo pipefail
          cat > random_nl_house.py <<'PY'
          import csv
          import io
          import json
          import os
          import random
          import zstandard as zstd

          DATASET_FILE = os.environ["DATASET_FILE"]

          def random_address_from_local_zstd_csv(path: str) -> dict:
              with open(path, "rb") as f:
                  dctx = zstd.ZstdDecompressor()
                  with dctx.stream_reader(f) as reader:
                      text_stream = io.TextIOWrapper(reader, encoding="utf-8", newline="")
                      csv_reader = csv.DictReader(text_stream, delimiter=";")
                      chosen = None
                      count = 0
                      for row in csv_reader:
                          straat = (row.get("straat") or "").strip()
                          huisnummer = (row.get("huisnummer") or "").strip()
                          postcode = (row.get("postcode") or "").strip()
                          if not straat or not huisnummer or not postcode:
                              continue
                          count += 1
                          if random.randrange(count) == 0:
                              chosen = row
                      if chosen is None:
                          raise RuntimeError("No usable address rows found.")
                      return chosen

          row = random_address_from_local_zstd_csv(DATASET_FILE)

          result = {
              "straat": (row.get("straat") or "").strip(),
              "huisnummer": (row.get("huisnummer") or "").strip(),
              "huisletter": (row.get("huisletter") or "").strip(),
              "huisnummertoevoeging": (row.get("huisnummertoevoeging") or "").strip(),
              "postcode": (row.get("postcode") or "").strip().replace(" ", "").upper(),
              "woonplaats": (row.get("woonplaats") or "").strip(),
              "gemeente": (row.get("gemeente") or "").strip(),
              "provincie": (row.get("provincie") or "").strip(),
              "lat": (row.get("lat") or "").strip(),
              "lon": (row.get("lon") or "").strip(),
          }

          with open("random-nl-house.json", "w", encoding="utf-8") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f'BOL_POSTAL_CODE={result["postcode"]}\n')
              f.write(f'BOL_STREET_NUMBER={result["huisnummer"]}\n')

          with open("random-nl-house.txt", "w", encoding="utf-8") as f:
              f.write("Random Dutch address\n")
              for k, v in result.items():
                  f.write(f"{k}: {v}\n")

          print(json.dumps(result, indent=2, ensure_ascii=False))
          PY
          python random_nl_house.py

      - name: Create package.json
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'EOF'
          {
            "name": "playwright-bol-smart-register",
            "private": true,
            "devDependencies": {
              "@playwright/test": "^1.54.0"
            }
          }
          EOF

      - name: Install Node dependencies
        shell: bash
        run: npm install

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Create Playwright config
        shell: bash
        run: |
          set -euo pipefail
          cat > playwright.config.js <<'EOF'
          const { defineConfig, devices } = require('@playwright/test');

          module.exports = defineConfig({
            testDir: './tests',
            timeout: 120000,
            expect: {
              timeout: 15000
            },
            retries: process.env.CI ? 1 : 0,
            reporter: [['html', { open: 'never' }], ['list']],
            use: {
              headless: true,
              viewport: { width: 1440, height: 1600 },
              screenshot: 'only-on-failure',
              trace: 'retain-on-failure',
              video: 'retain-on-failure'
            },
            projects: [
              {
                name: 'chromium',
                use: { ...devices['Desktop Chrome'] }
              }
            ]
          });
          EOF

      - name: Create Playwright test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tests
          cat > tests/bol-register-smart.spec.js <<'EOF'
          const { test, expect } = require('@playwright/test');
          const fs = require('fs');
          const path = require('path');

          test('smartly evaluate and fill bol registration form', async ({ page }, testInfo) => {
            const screenshotDir = path.join(testInfo.outputDir, 'step-screenshots');
            fs.mkdirSync(screenshotDir, { recursive: true });

            let step = 1;
            async function snap(name) {
              const filename = `${String(step).padStart(2, '0')}-${name}.png`;
              await page.screenshot({
                path: path.join(screenshotDir, filename),
                fullPage: true
              });
              step += 1;
            }

            const formData = {
              firstName: process.env.BOL_FIRST_NAME || 'Jan',
              infix: process.env.BOL_INFIX || '',
              lastName: process.env.BOL_LAST_NAME || 'Dijk',
              salutation: (process.env.BOL_SALUTATION || 'UNKNOWN').toUpperCase(),
              countryMode: (process.env.BOL_COUNTRY_MODE || 'NL').toUpperCase(),
              postalCode: (process.env.BOL_POSTAL_CODE || '').replace(/\s+/g, '').toUpperCase(),
              streetNumber: process.env.BOL_STREET_NUMBER || '',
              phone: process.env.BOL_PHONE || '0612345678',
              birthday: process.env.BOL_BIRTHDAY || '01-01-1990',
              email: process.env.BOL_EMAIL || 'test@example.com',
              password: process.env.BOL_PASSWORD || 'StrongPass123!',
              purchaseNewsletter: String(process.env.BOL_PURCHASE_NEWSLETTER || 'true').toLowerCase() === 'true',
              recommendationNewsletter: String(process.env.BOL_RECOMMENDATION_NEWSLETTER || 'false').toLowerCase() === 'true',
              submit: String(process.env.SUBMIT_FORM || 'false').toLowerCase() === 'true'
            };

            async function waitForStable() {
              await page.waitForLoadState('domcontentloaded');
              await page.waitForTimeout(1000);
              await page.waitForLoadState('networkidle').catch(() => {});
            }

            async function dismissCookieOrModalIfPresent() {
              const candidates = [
                page.getByRole('button', { name: /accepteren|accept|akkoord|ok|toestaan/i }),
                page.getByRole('button', { name: /alles accepteren|accept all/i }),
                page.locator('button:has-text("Accepteren")'),
                page.locator('button:has-text("Akkoord")')
              ];
              for (const locator of candidates) {
                try {
                  if (await locator.first().isVisible({ timeout: 1000 })) {
                    await locator.first().click();
                    await page.waitForTimeout(500);
                    break;
                  }
                } catch {}
              }
            }

            async function fillByNameOrLabel(fieldNames, labelRegex, value) {
              if (value === undefined || value === null) return false;

              for (const name of fieldNames) {
                const byName = page.locator(`[name="${name}"]`).first();
                if (await byName.count()) {
                  await byName.scrollIntoViewIfNeeded();
                  await byName.fill('');
                  await byName.fill(String(value));
                  return true;
                }
              }

              try {
                const byLabel = page.getByLabel(labelRegex).first();
                if (await byLabel.count()) {
                  await byLabel.scrollIntoViewIfNeeded();
                  await byLabel.fill('');
                  await byLabel.fill(String(value));
                  return true;
                }
              } catch {}

              return false;
            }

            async function setCheckboxById(id, desired) {
              const button = page.locator(`button#${id}[role="checkbox"]`).first();
              if (!(await button.count())) return false;
              await button.scrollIntoViewIfNeeded();
              const checked = (await button.getAttribute('aria-checked')) === 'true';
              if (checked !== desired) {
                await button.click();
                await page.waitForTimeout(200);
              }
              return true;
            }

            async function selectSalutation(target) {
              const radioButtons = page.locator('button[role="radio"]');
              const count = await radioButtons.count();
              for (let i = 0; i < count; i++) {
                const btn = radioButtons.nth(i);
                const value = ((await btn.getAttribute('value')) || '').toUpperCase();
                const title = (await btn.getAttribute('title')) || '';
                if (
                  value === target ||
                  (target === 'FEMALE' && /mevrouw/i.test(title)) ||
                  (target === 'MALE' && /heer/i.test(title)) ||
                  (target === 'UNKNOWN' && /liever geen/i.test(title))
                ) {
                  await btn.click();
                  return true;
                }
              }
              return false;
            }

            async function selectCountryTab(mode) {
              const map = {
                NL: /nederland/i,
                BE: /belgië|belgie/i,
                WORLD: /wereld/i
              };
              const pattern = map[mode] || map.NL;
              const tab = page.getByRole('tab', { name: pattern }).first();
              if (await tab.count()) {
                await tab.click();
                await page.waitForTimeout(800);
                return true;
              }
              return false;
            }

            async function getAddressState() {
              const street = await page.locator('[name="NLstreet"]').inputValue().catch(() => '');
              const city = await page.locator('[name="NLcity"]').inputValue().catch(() => '');
              const notFoundVisible = await page.locator('text=Geen adres gevonden').first().isVisible().catch(() => false);
              const notFoundDescVisible = await page.locator('text=Er is geen adres gevonden met de opgegeven postcode en huisnummer').first().isVisible().catch(() => false);

              return {
                street: street.trim(),
                city: city.trim(),
                notFoundVisible,
                notFoundDescVisible,
                success: !!street.trim() && !!city.trim() && !notFoundVisible && !notFoundDescVisible
              };
            }

            async function discoverForm() {
              return await page.evaluate(() => {
                const text = (el) => (el?.textContent || '').trim();

                const inputs = Array.from(document.querySelectorAll('input, textarea, select')).map((el) => {
                  const id = el.getAttribute('id') || '';
                  const name = el.getAttribute('name') || '';
                  const type = el.getAttribute('type') || el.tagName.toLowerCase();
                  const label =
                    (id && document.querySelector(`label[for="${id}"]`)?.textContent?.trim()) ||
                    el.getAttribute('aria-label') ||
                    '';
                  return {
                    tag: el.tagName.toLowerCase(),
                    id,
                    name,
                    type,
                    label,
                    disabled: !!el.disabled,
                    hidden: el.hidden,
                    value: el.value || ''
                  };
                });

                const radios = Array.from(document.querySelectorAll('[role="radio"]')).map((el) => ({
                  id: el.getAttribute('id') || '',
                  value: el.getAttribute('value') || '',
                  title: el.getAttribute('title') || '',
                  checked: el.getAttribute('aria-checked') === 'true'
                }));

                const checkboxes = Array.from(document.querySelectorAll('[role="checkbox"]')).map((el) => ({
                  id: el.getAttribute('id') || '',
                  value: el.getAttribute('value') || '',
                  checked: el.getAttribute('aria-checked') === 'true',
                  label: text(document.querySelector(`label[for="${el.getAttribute('id')}"]`))
                }));

                const tabs = Array.from(document.querySelectorAll('[role="tab"]')).map((el) => ({
                  id: el.getAttribute('id') || '',
                  selected: el.getAttribute('aria-selected') === 'true',
                  text: text(el)
                }));

                return { inputs, radios, checkboxes, tabs };
              });
            }

            await page.goto('https://login.bol.com/wsp/register', { waitUntil: 'domcontentloaded' });
            await waitForStable();
            await dismissCookieOrModalIfPresent();
            await snap('opened-register-page');

            await expect(page).toHaveURL(/login\.bol\.com\/wsp\/register/);
            await expect(page.locator('form')).toBeVisible();
            await snap('form-visible');

            const discovered = await discoverForm();
            console.log('DISCOVERED_FORM=' + JSON.stringify(discovered, null, 2));
            await testInfo.attach('discovered-form.json', {
              body: Buffer.from(JSON.stringify(discovered, null, 2)),
              contentType: 'application/json'
            });

            await selectSalutation(formData.salutation);
            await snap('salutation-set');

            await fillByNameOrLabel(['firstName'], /voornaam/i, formData.firstName);
            await snap('first-name-filled');

            if (formData.infix) {
              await fillByNameOrLabel(['infix'], /tussenvoegsel/i, formData.infix);
              await snap('infix-filled');
            }

            await fillByNameOrLabel(['lastName'], /achternaam/i, formData.lastName);
            await snap('last-name-filled');

            await selectCountryTab(formData.countryMode);
            await snap('country-tab-selected');

            if (formData.countryMode === 'NL') {
              if (!formData.postalCode || !formData.streetNumber) {
                throw new Error('Missing BOL_POSTAL_CODE or BOL_STREET_NUMBER from dataset step.');
              }

              await fillByNameOrLabel(['NLpostalCode'], /postcode/i, formData.postalCode);
              await snap('nl-postcode-filled');

              await fillByNameOrLabel(['NLstreetNumber'], /huisnummer/i, formData.streetNumber);
              await snap('nl-house-number-filled');

              await page.waitForTimeout(2500);

              const addressState = await getAddressState();
              console.log('ADDRESS_STATE=' + JSON.stringify(addressState, null, 2));
              await testInfo.attach('address-state.json', {
                body: Buffer.from(JSON.stringify(addressState, null, 2)),
                contentType: 'application/json'
              });

              if (!addressState.success) {
                throw new Error(
                  `Dataset address was rejected by bol. postcode=${formData.postalCode} huisnummer=${formData.streetNumber}`
                );
              }

              await snap('nl-address-resolved');
            }

            await fillByNameOrLabel(['phone'], /telefoonnummer/i, formData.phone);
            await snap('phone-filled');

            if (formData.birthday) {
              await fillByNameOrLabel(['birthday'], /geboortedatum/i, formData.birthday);
              await snap('birthday-filled');
            }

            await fillByNameOrLabel(['email'], /email/i, formData.email);
            await snap('email-filled');

            await fillByNameOrLabel(['password'], /wachtwoord/i, formData.password);
            await snap('password-filled');

            await setCheckboxById('purchaseNewsletter', formData.purchaseNewsletter);
            await snap('purchase-newsletter-set');

            await setCheckboxById('recommendationNewsletter', formData.recommendationNewsletter);
            await snap('recommendation-newsletter-set');

            await snap('final-filled-state');

            if (formData.submit) {
              const submitButton = page.getByRole('button', { name: /registreer/i }).first();
              await expect(submitButton).toBeVisible();
              await submitButton.click();
              await page.waitForTimeout(4000);
              await snap('after-submit');
            } else {
              console.log('SUBMIT_FORM=false, skipping submit by design.');
            }
          });
          EOF

      - name: Run Playwright test
        shell: bash
        run: npx playwright test

      - name: Add result to job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Playwright bol register run"
            echo
            echo "- Cache hit: \`${{ steps.cache-dataset.outputs.cache-hit }}\`"
            echo "- Postcode: \`${BOL_POSTAL_CODE:-}\`"
            echo "- Huisnummer: \`${BOL_STREET_NUMBER:-}\`"
            echo
            if [ -f random-nl-house.txt ]; then
              cat random-nl-house.txt
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload random address JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: random-nl-house-json
          path: random-nl-house.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload random address text
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: random-nl-house-text
          path: random-nl-house.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
